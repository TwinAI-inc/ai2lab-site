<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | AI² Lab · Dr. Mohammad Dehghani</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
    --neu-red:#C41230;
    --neu-red-light:#ff4d6d;
    --text-primary:#1a1a2e;
    --text-secondary:#64748b;
    --text-muted:#94a3b8;
    --bg-light:#fafbfc;
    --bg-soft:#f1f5f9;
    --card-bg:#ffffff;
    --border-color:#e2e8f0;
    --gold:#d4a84b;
    --shadow-sm:0 2px 8px rgba(0,0,0,0.04);
    --shadow-md:0 8px 28px rgba(0,0,0,0.06);
    --shadow-lg:0 20px 60px rgba(0,0,0,0.1);
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-light);color:var(--text-primary);line-height:1.6;min-height:100vh}

/* Background orbs */
body::before{content:'';position:fixed;top:-150px;right:-120px;width:480px;height:480px;background:radial-gradient(circle,rgba(196,18,48,0.05) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-160px;left:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(212,168,75,0.06) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}

/* Sticky AI²Lab header */
header{
    background:linear-gradient(135deg,rgba(255,255,255,0.95) 0%,rgba(250,251,252,0.92) 100%);
    backdrop-filter:blur(20px) saturate(1.4);
    -webkit-backdrop-filter:blur(20px) saturate(1.4);
    border-bottom:1px solid rgba(255,255,255,0.8);
    box-shadow:0 2px 24px rgba(0,0,0,0.05);
    padding:14px 0;position:sticky;top:0;z-index:1000;
}
.header-container{max-width:1400px;margin:0 auto;padding:0 30px;display:flex;justify-content:space-between;align-items:center;gap:18px}
.logo-section{display:flex;align-items:center;gap:14px}
.ai2-logo-wrap{display:flex;flex-direction:column;align-items:center;text-decoration:none;transition:all .25s ease}
.ai2-logo-wrap:hover{transform:translateY(-1px)}
.ai2-logo{display:inline-flex;align-items:center;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);border:1px solid rgba(0,0,0,0.08);border-radius:50px;padding:6px 12px;box-shadow:0 2px 12px rgba(0,0,0,0.05),0 1px 2px rgba(0,0,0,0.03)}
.ai2-logo .bracket{font-family:'JetBrains Mono',monospace;font-size:16px;color:#ddd;font-weight:300}
.ai2-logo .text{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;color:#1a1a2e;padding:0 3px}
.ai2-logo .text sup{font-size:7px;color:#C41230}
.ai2-logo-line{height:2px;width:40px;background:linear-gradient(90deg,#C41230,#1a1a2e);border-radius:2px;margin-top:4px}
.page-tag{font-size:0.78rem;color:var(--text-secondary);font-weight:500;letter-spacing:.04em}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:0.85rem;font-weight:600;color:var(--neu-red);text-decoration:none;padding:8px 16px;border-radius:99px;background:rgba(196,18,48,0.06);border:1px solid rgba(196,18,48,0.15);transition:all .25s ease}
.back-link:hover{background:rgba(196,18,48,0.12);transform:translateX(-2px)}
.back-link svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5}

/* Hero */
.container{max-width:1400px;margin:0 auto;padding:56px 30px 80px;position:relative;z-index:1}
.hero{text-align:center;margin-bottom:36px}
.hero .eyebrow{display:inline-block;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:var(--neu-red);background:rgba(196,18,48,0.08);padding:6px 16px;border-radius:99px;border:1px solid rgba(196,18,48,0.2);margin-bottom:14px}
.hero h1{font-size:3rem;font-weight:800;color:var(--text-primary);letter-spacing:-0.025em;line-height:1.08;margin-bottom:14px}
.hero h1 .accent{background:linear-gradient(135deg,var(--neu-red),#ff4d6d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero .tagline{font-size:1.1rem;color:var(--text-secondary);max-width:720px;margin:0 auto;line-height:1.6}

/* Filter bar */
.filters{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:30px 0 40px}
.filter-btn{padding:9px 22px;border-radius:99px;border:1.5px solid var(--border-color);background:var(--card-bg);color:var(--text-secondary);font-family:inherit;font-size:0.85rem;font-weight:700;cursor:pointer;transition:all .25s ease;box-shadow:var(--shadow-sm);text-transform:capitalize}
.filter-btn:hover{border-color:var(--neu-red);color:var(--neu-red);transform:translateY(-1px)}
.filter-btn.active{background:linear-gradient(135deg,var(--neu-red),#ff4d6d);color:#fff;border-color:var(--neu-red);box-shadow:0 6px 18px rgba(196,18,48,0.3)}

/* Gallery grid */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.g-item{position:relative;border-radius:16px;overflow:hidden;cursor:pointer;background:var(--card-bg);border:1px solid var(--border-color);box-shadow:var(--shadow-sm);transition:all .35s cubic-bezier(.22,1,.36,1);aspect-ratio:4/3;display:block}
.g-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.g-item:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(196,18,48,0.15)}
.g-item:hover img{transform:scale(1.06)}
.g-overlay{position:absolute;left:0;right:0;bottom:0;padding:40px 18px 16px 18px;background:linear-gradient(180deg,transparent 0%,rgba(0,0,0,0.85) 100%);color:#fff;pointer-events:none;opacity:0;transform:translateY(8px);transition:all .3s ease}
.g-item:hover .g-overlay{opacity:1;transform:translateY(0)}
.g-caption{font-size:0.92rem;font-weight:700;line-height:1.4;text-shadow:0 2px 8px rgba(0,0,0,0.6)}
.g-year{display:inline-block;font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:99px;background:rgba(212,168,75,0.25);color:#fbbf24;border:1px solid rgba(212,168,75,0.4);margin-bottom:6px;letter-spacing:.04em}
.g-tag{position:absolute;top:12px;left:12px;padding:4px 12px;border-radius:99px;font-size:0.66rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;background:rgba(255,255,255,0.94);backdrop-filter:blur(8px);color:var(--neu-red);border:1px solid rgba(255,255,255,0.6);box-shadow:0 2px 8px rgba(0,0,0,0.1);z-index:2}
.g-item.hide{display:none}

/* Lightbox modal */
.lb-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:2000;display:none;align-items:center;justify-content:center;padding:40px 20px;cursor:pointer;opacity:0;transition:opacity .3s ease}
.lb-overlay.show{display:flex;opacity:1}
.lb-box{max-width:min(95vw,1400px);max-height:90vh;position:relative;cursor:default;animation:zoomIn .35s cubic-bezier(.22,1,.36,1)}
@keyframes zoomIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
.lb-box img{max-width:100%;max-height:80vh;border-radius:12px;box-shadow:0 30px 80px rgba(0,0,0,0.6);display:block}
.lb-caption{color:#fff;text-align:center;margin-top:16px;font-size:1.02rem;font-weight:600;text-shadow:0 2px 10px rgba(0,0,0,0.7)}
.lb-close{position:absolute;top:-44px;right:0;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .2s ease;font-family:inherit}
.lb-close:hover{background:#fff;color:#000}

/* Footer */
.g-footer{text-align:center;margin-top:56px;padding-top:32px;border-top:1px solid var(--border-color);color:var(--text-muted);font-size:0.8rem;font-weight:500}
.g-footer a{color:var(--neu-red);text-decoration:none;font-weight:600}
.g-footer a:hover{text-decoration:underline}

@media(max-width:780px){
    .hero h1{font-size:2rem}
    .container{padding:36px 20px 60px}
    .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
}
</style>
</head>
<body>

<header>
    <div class="header-container">
        <div class="logo-section">
            <a href="index.html" class="ai2-logo-wrap">
                <div class="ai2-logo">
                    <span class="bracket">[</span>
                    <span class="text">AI<sup>2</sup></span>
                    <span class="bracket">]</span>
                </div>
                <div class="ai2-logo-line"></div>
            </a>
            <span class="page-tag">· Gallery</span>
        </div>
        <a href="index.html" class="back-link">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            Back to AI²Lab
        </a>
    </div>
</header>

<div class="container">

    <div class="hero">
        <div class="eyebrow">Moments, Talks &amp; Travel</div>
        <h1>AI²Lab <span class="accent">Gallery</span></h1>
        <p class="tagline">A visual archive of conferences, student trips, awards, campus life, and the people who make the lab what it is.</p>
    </div>

    <!-- Filter bar -->
    <div class="filters" id="filters">
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="events">Events &amp; Awards</button>
        <button class="filter-btn" data-cat="travel">Travel &amp; DoC</button>
        <button class="filter-btn" data-cat="campus">Campus</button>
        <button class="filter-btn" data-cat="teaching">Teaching</button>
        <button class="filter-btn" data-cat="team">Team</button>
    </div>

    <!-- Gallery grid -->
    <div class="gallery-grid" id="gallery"></div>

    <div class="g-footer">
        <div>AI²Lab · Northeastern University</div>
        <div style="margin-top:6px">Back to <a href="index.html">ai2lab.ai</a></div>
    </div>
</div>

<!-- Lightbox -->
<div class="lb-overlay" id="lb" onclick="if(event.target===this)closeLb()">
    <div class="lb-box">
        <button class="lb-close" onclick="closeLb()">&times;</button>
        <img id="lbImg" src="" alt="">
        <div class="lb-caption" id="lbCap"></div>
    </div>
</div>

<script>
const PHOTOS = [
    // Events & Awards
    {src:'event-mcdm-istanbul-2019.jpg',cat:'events',year:'2019',cap:'MCDM · Creative Decisions Foundation Award, Istanbul'},
    {src:'event-wsc-best-paper-award-2015.jpg',cat:'events',year:'2015',cap:'WSC Best Paper Award'},
    {src:'event-wsc-huntington-beach-2015.jpg',cat:'events',year:'2015',cap:'Winter Simulation Conference · Huntington Beach'},
    {src:'event-iise-best-paper-anaheim-2016.jpg',cat:'events',year:'2016',cap:'IISE Best Paper · Anaheim'},
    {src:'event-informs-anaheim-2021.jpg',cat:'events',year:'2021',cap:'INFORMS · Anaheim'},
    {src:'event-informs-beach-2021.jpg',cat:'events',year:'2021',cap:'INFORMS beachside gathering'},
    {src:'event-leren-defense-2023.jpg',cat:'events',year:'2023',cap:'PhD Defense · Le Ren'},
    {src:'event-eurosim-amsterdam-2023.jpg',cat:'events',year:'2023',cap:'EuroSim · Amsterdam'},
    {src:'event-bertsimas-visit.jpg',cat:'events',year:'2024',cap:'Visit with Dimitris Bertsimas'},
    {src:'event-tii-talk-abudhabi-2024.jpg',cat:'events',year:'2024',cap:'TII Talk · Abu Dhabi'},
    {src:'event-galante-banquet-2023.jpg',cat:'events',year:'2023',cap:'Galante Program Banquet'},
    {src:'event-iise-conference-2026.jpg',cat:'events',year:'2026',cap:'IISE Conference'},
    {src:'event-google-hq-mountain-view-2025.jpg',cat:'events',year:'2025',cap:'Google HQ · Mountain View'},
    // Travel / Dialogue of Civilizations
    {src:'doc-turkey-blue-mosque-2023.jpg',cat:'travel',year:'2023',cap:'Dialogue of Civilizations · Blue Mosque, Istanbul'},
    {src:'doc-turkey-bosphorus-2023.jpg',cat:'travel',year:'2023',cap:'DoC · Bosphorus, Istanbul'},
    {src:'doc-turkey-class-group-2023.jpg',cat:'travel',year:'2023',cap:'DoC · Class group photo, Turkey'},
    {src:'doc-turkey-ephesus-2022.jpg',cat:'travel',year:'2022',cap:'DoC · Ephesus ruins'},
    {src:'doc-turkey-local-market-izmir-2023.jpg',cat:'travel',year:'2023',cap:'DoC · Local market, Izmir'},
    // Campus
    {src:'campus-graduation-president-aoun-2021.jpg',cat:'campus',year:'2021',cap:'Commencement with President Aoun'},
    {src:'campus-fall-vibes-boston-2024.jpg',cat:'campus',year:'2024',cap:'Fall on the Boston campus'},
    // Teaching
    {src:'teaching-rl-class-covid-2020.jpg',cat:'teaching',year:'2020',cap:'Reinforcement Learning class · COVID era'},
    {src:'teaching-rl-wonderland-robots.jpg',cat:'teaching',year:'2022',cap:'RL Wonderland robots demo'},
    // Team
    {src:'team-students-northeastern-campus.jpg',cat:'team',year:'2023',cap:'Students on the Northeastern campus'},
    {src:'team-birthday-ashwin-emily.jpg',cat:'team',year:'2024',cap:'Lab birthday celebration · Ashwin &amp; Emily'}
];

const CAT_LABELS = {events:'Event',travel:'Travel',campus:'Campus',teaching:'Teaching',team:'Team'};

function renderGallery(){
    const grid = document.getElementById('gallery');
    let html = '';
    PHOTOS.forEach((p,i)=>{
        html += '<a class="g-item" data-cat="'+p.cat+'" onclick="openLb('+i+')">' +
                '<span class="g-tag">'+CAT_LABELS[p.cat]+'</span>' +
                '<img loading="lazy" decoding="async" src="assets/images/gallery/'+p.src+'" alt="'+p.cap.replace(/&amp;/g,'and')+'">' +
                '<div class="g-overlay">' +
                '<div class="g-year">'+p.year+'</div>' +
                '<div class="g-caption">'+p.cap+'</div>' +
                '</div>' +
                '</a>';
    });
    grid.innerHTML = html;
}

function filterCat(cat){
    document.querySelectorAll('.g-item').forEach(el=>{
        const match = cat==='all' || el.dataset.cat===cat;
        el.classList.toggle('hide',!match);
    });
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
}

function openLb(i){
    const p = PHOTOS[i];
    document.getElementById('lbImg').src = 'assets/images/gallery/'+p.src;
    document.getElementById('lbCap').textContent = p.cap.replace(/&amp;/g,'&');
    document.getElementById('lb').classList.add('show');
}
function closeLb(){document.getElementById('lb').classList.remove('show')}

document.addEventListener('DOMContentLoaded',()=>{
    renderGallery();
    document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',()=>filterCat(b.dataset.cat)));
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb()});
    if(window.lucide)lucide.createIcons();
});
</script>
</body>
</html>
